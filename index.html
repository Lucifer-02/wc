<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>ĐUA TOP BÚNG TAI WC 2026</title>
    <meta
      name="description"
      content=""
    />
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>ĐUA TOP BÚNG TAI</h1>
      </header>

      <main>
        <section class="content-section">
          <div class="section-header">
            <h2 class="section-title">ĐUA</h2>
            <button class="action-btn" onclick="openFullscreenAndRotate(document.querySelector('.video-wrapper'), true)">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>
              Phóng to & Xoay
            </button>
          </div>
          <div class="media-container video-wrapper">
            <video
              controls
              preload="metadata"
              playsinline
              width="100%"
              poster="thumbnail.jpg"
            >
              <source src="race.mp4" type="video/mp4" />
              Trình duyệt của bạn không hỗ trợ thẻ video.
            </video>
          </div>
        </section>

        <section class="content-section">
          <div class="section-header">
            <h2 class="section-title">TỈ LỆ CHÍNH XÁC</h2>
            <button class="action-btn" onclick="openFullscreenAndRotate(document.querySelector('.chart-wrapper'), false)">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>
              Phóng to & Xoay
            </button>
          </div>
          <p class="instruction">
          Shift+Click <tên người chơi> để highlight nhiều người chơi.
          </p>
          <div class="media-container chart-wrapper">
            <iframe
              src="ratio_chart_altair.html"
              title="Interactive Ratio Chart"
              scrolling="no"
            ></iframe>
          </div>
        </section>
      </main>

      <footer>
        <p>&copy; 2026 Bảng Xếp Hạng</p>
      </footer>
    </div>

    <script>
      function openFullscreenAndRotate(wrapper, isVideo) {
        let videoEl = isVideo ? wrapper.querySelector('video') : null;
        let requestMethod = wrapper.requestFullscreen || wrapper.webkitRequestFullscreen || wrapper.msRequestFullscreen;

        if (requestMethod) {
          // Try standard API
          let promise = requestMethod.call(wrapper);
          if (promise !== undefined) {
            promise.then(() => {
              if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('landscape').catch(() => {});
              }
            }).catch(err => {
              fallbackFullscreen(wrapper, videoEl);
            });
          } else {
            // For older browsers that don't return a promise
            setTimeout(() => {
              if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                fallbackFullscreen(wrapper, videoEl);
              }
            }, 500);
          }
        } else {
          fallbackFullscreen(wrapper, videoEl);
        }
      }

      function fallbackFullscreen(wrapper, videoEl) {
        // Fallback for video on iOS
        if (videoEl && videoEl.webkitEnterFullscreen) {
          videoEl.webkitEnterFullscreen();
          return;
        }

        // CSS Fake Fullscreen with rotation
        if (wrapper.classList.contains('pseudo-fullscreen')) return;
        
        wrapper.classList.add('pseudo-fullscreen');
        document.body.style.overflow = 'hidden';

        let closeBtn = document.createElement('button');
        closeBtn.innerHTML = '✖ Đóng';
        closeBtn.className = 'pseudo-close-btn action-btn';
        closeBtn.onclick = function() {
          wrapper.classList.remove('pseudo-fullscreen');
          document.body.style.overflow = '';
          closeBtn.remove();
        };
        wrapper.appendChild(closeBtn);
      }
    </script>
  </body>
</html>
