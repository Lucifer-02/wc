<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>ĐUA TOP BÚNG TAI WC 2026</title>
    <meta
      name="description"
      content=""
    />
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>ĐUA TOP BÚNG TAI</h1>
      </header>

      <main>
        <section class="content-section">
          <div class="section-header">
            <h2 class="section-title">ĐUA</h2>
            <button class="action-btn" onclick="openFullscreenAndRotate(document.querySelector('.video-wrapper video'))">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>
              Phóng to & Xoay
            </button>
          </div>
          <div class="media-container video-wrapper">
            <video
              controls
              preload="metadata"
              playsinline
              width="100%"
              poster="thumbnail.jpg"
            >
              <source src="race.mp4" type="video/mp4" />
              Trình duyệt của bạn không hỗ trợ thẻ video.
            </video>
          </div>
        </section>

        <section class="content-section">
          <div class="section-header">
            <h2 class="section-title">TỈ LỆ CHÍNH XÁC</h2>
            <button class="action-btn" onclick="openFullscreenAndRotate(document.querySelector('.chart-wrapper'))">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>
              Phóng to & Xoay
            </button>
          </div>
          <p class="instruction">
          Shift+Click <tên người chơi> để highlight nhiều người chơi.
          </p>
          <div class="media-container chart-wrapper">
            <iframe
              src="ratio_chart_altair.html"
              title="Interactive Ratio Chart"
              scrolling="no"
            ></iframe>
          </div>
        </section>
      </main>

      <footer>
        <p>&copy; 2026 Bảng Xếp Hạng</p>
      </footer>
    </div>

    <script>
      function openFullscreenAndRotate(element) {
        let requestMethod = element.requestFullscreen || element.webkitRequestFullscreen || element.msRequestFullscreen;

        if (requestMethod) {
          requestMethod.call(element).then(() => {
            if (screen.orientation && screen.orientation.lock) {
              screen.orientation.lock('landscape').catch(function(error) {
                console.log("Orientation lock not supported or failed: ", error);
              });
            }
          }).catch(err => {
            console.log(`Lỗi khi mở toàn màn hình: ${err.message}`);
          });
        } else {
          alert("Trình duyệt của bạn không hỗ trợ tính năng toàn màn hình.");
        }
      }
    </script>
  </body>
</html>
